<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All in 1 School Database & Assessment Center</title>
    <script>
      // Suppress expected Vite HMR WebSocket errors in the AI Studio environment
      const originalError = console.error;
      const originalWarn = console.warn;
      const suppress = (msg) => typeof msg === 'string' && (msg.includes('WebSocket closed') || msg.toLowerCase().includes('websocket') || msg.includes('failed to connect to websocket'));
      
      console.error = function(...args) {
        if (args[0] && suppress(args[0])) return;
        originalError.apply(console, args);
      };
      console.warn = function(...args) {
        if (args[0] && suppress(args[0])) return;
        originalWarn.apply(console, args);
      };
      window.addEventListener('unhandledrejection', function(event) {
        const msg = event.reason && event.reason.message ? event.reason.message : String(event.reason);
        if (msg.includes('WebSocket closed') || msg.includes('websocket')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
