<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All in 1 School Database & Assessment Center</title>
    <script>
      // Suppress expected Vite HMR WebSocket errors in the AI Studio environment
      const originalError = console.error;
      const originalWarn = console.warn;
      const suppress = (msg) => {
        if (!msg) return false;
        const str = String(msg).toLowerCase();
        return str.includes('websocket') || 
               str.includes('failed to connect') ||
               str.includes('closed without opened') ||
               str.includes('connection refused') ||
               str.includes('[vite]');
      };
      
      console.error = function(...args) {
        if (args[0] && suppress(args[0])) return;
        originalError.apply(console, args);
      };
      console.warn = function(...args) {
        if (args[0] && suppress(args[0])) return;
        originalWarn.apply(console, args);
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        const msg = (reason && (reason.message || String(reason))) || '';
        if (suppress(msg)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
